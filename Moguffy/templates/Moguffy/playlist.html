{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>Moguffy - Playlist</title>

<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#000;
padding:20px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
margin:15px 0;
}

.sidebar ul li a{
color:white;
text-decoration:none;
font-size:16px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.main{
flex:1;
padding:30px;
overflow-y:auto;
}

.song{
background:#181818;
padding:15px;
margin-bottom:10px;
border-radius:6px;
}

audio{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">Moguffy</div>

<ul>
<li><a href="{% url 'home' %}">🏠 Home</a></li>
<li><a href="{% url 'search' %}">🔍 Search</a></li>
<li><a href="{% url 'library' %}">🎵 Your Library</a></li>
<li><a href="{% url 'liked' %}">❤️ Liked Songs</a></li>
<li><a href="{% url 'playlist' %}">📀 Playlists</a></li>
</ul>

</div>

<div class="main">

<h2>Your Playlist</h2>

{% for song in songs %}

<div class="song">

<h3>{{ song.title }}</h3>
<p>{{ song.artist }}</p>

<audio controls>
<source src="{{ song.audio.url }}" type="audio/mpeg">
</audio>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
